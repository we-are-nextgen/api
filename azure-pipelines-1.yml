# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'f4c5c3b1-ef89-4fad-b1c7-0dfcb7672f18'
  imageRepository: 'wearenextgenapi'
  containerRegistry: 'wearenextgen-amhzfvc8btfyacfb.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/src/main/docker/Dockerfile.jvm'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Maven@4
      displayName: Build Quarkus application
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'package'
        options: '-DskipTests'
        jdkVersionOption: '1.21'
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: 'acr-service-connection'
    - script: |
        docker build -f src/main/docker/Dockerfile.jvm -t $(acrLoginServer)/api:$(tag) -t $(acrLoginServer)/api:latest .
        docker push $(acrLoginServer)/api:$(tag)
        docker push $(acrLoginServer)/api:latest
      displayName: Build and push to ACR
      workingDirectory: '$(Build.SourcesDirectory)'