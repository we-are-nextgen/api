# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  acrLoginServer: 'wearenextgen-amhzfvc8btfyacfb.azurecr.io'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Maven@4
      displayName: Build Quarkus application
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'package'
        options: '-DskipTests'
        jdkVersionOption: '1.21'
    - task: Docker@2
      displayName: Login to ACR
      inputs:
        command: login
        containerRegistry: 'acr-service-connection'
    - script: |
        docker build -f src/main/docker/Dockerfile.jvm -t $(acrLoginServer)/api:$(tag) -t $(acrLoginServer)/api:latest .
        docker push $(acrLoginServer)/api:$(tag)
        docker push $(acrLoginServer)/api:latest
      displayName: Build and push to ACR
      workingDirectory: '$(Build.SourcesDirectory)'
